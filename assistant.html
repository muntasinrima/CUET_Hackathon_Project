<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ResQ AI - Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="assistant">
    <div class="app-container">
        <aside class="main-sidebar">
            <div class="sidebar-brand">
                <a href="index.html"
                    style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-shield-halved brand-icon"></i>
                    <h2>ResQ <span>AI</span></h2>
                </a>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="map.html" class="menu-item"><i class="fa-solid fa-map-location-dot"></i> Map</a>
                <a href="shelters.html" class="menu-item"><i class="fa-solid fa-person-shelter"></i> Shelters</a>
                <a href="heatwave.html" class="menu-item"><i class="fa-solid fa-temperature-high"></i> Heatwave</a>
                <a href="assistant.html" class="menu-item active"><i class="fa-solid fa-robot"></i> AI Assistant</a>
                <a href="report.html" class="menu-item"><i class="fa-solid fa-triangle-exclamation"></i> Report</a>
                <a href="settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
        </aside>
        <main class="content-viewport">
            <div class="dynamic-container">
                <div class="panel-card">
                    <h3>ResQ AI Chat Core</h3>
                    <div id="chat-messages" class="chat-messages">
                        <div class="chat-bubble bot">Ask me about shelters, heatwave risk, safe movement, or emergency reporting.</div>
                    </div>
                    <form id="chat-form" class="chat-form">
                        <input id="chat-input" type="text" placeholder="Type your question..." autocomplete="off">
                        <button class="action-btn-primary" type="submit"><i class="fa-solid fa-paper-plane"></i> Send</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="data/config.js"></script>
    <script src="data/utils.js"></script>
    <script src="data/assistant.js"></script>
    <script src="data/app.js"></script>
</body>

</html>
