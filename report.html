<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ResQ AI - Report Incident</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="report">
    <div class="app-container">
        <aside class="main-sidebar">
            <div class="sidebar-brand">
                <a href="index.html"
                    style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-shield-halved brand-icon"></i>
                    <h2>ResQ <span>AI</span></h2>
                </a>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="map.html" class="menu-item"><i class="fa-solid fa-map-location-dot"></i> Map</a>
                <a href="shelters.html" class="menu-item"><i class="fa-solid fa-person-shelter"></i> Shelters</a>
                <a href="heatwave.html" class="menu-item"><i class="fa-solid fa-temperature-high"></i> Heatwave</a>
                <a href="assistant.html" class="menu-item"><i class="fa-solid fa-robot"></i> AI Assistant</a>
                <a href="report.html" class="menu-item active"><i class="fa-solid fa-triangle-exclamation"></i>
                    Report</a>
                <a href="settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
        </aside>
        <main class="content-viewport">
            <div class="dynamic-container">
                <div class="panel-card">
                    <h3>Emergency Report Control</h3>
                    <p class="muted-line">Submit incident information with your current location attached automatically.</p>
                    <form id="report-form" class="settings-form">
                        <label>Incident type
                            <select name="type" required>
                                <option value="medical">Medical emergency</option>
                                <option value="shelter">Shelter support needed</option>
                                <option value="road">Road blocked</option>
                                <option value="food">Food or water shortage</option>
                                <option value="other">Other hazard</option>
                            </select>
                        </label>
                        <label>Severity
                            <select name="severity" required>
                                <option value="high">High</option>
                                <option value="medium">Medium</option>
                                <option value="low">Low</option>
                            </select>
                        </label>
                        <label>Contact number
                            <input name="contact" type="tel" placeholder="Optional phone number">
                        </label>
                        <label>Details
                            <textarea name="details" rows="5" placeholder="Write what happened, how many people need help, and any road issue." required></textarea>
                        </label>
                        <button class="action-btn-primary" type="submit">Submit report</button>
                    </form>
                    <div id="report-status" class="route-output">No report submitted yet.</div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
