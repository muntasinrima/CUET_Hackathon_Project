<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ResQ AI - Map Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <aside class="main-sidebar">
            <div class="sidebar-brand">
                <a href="index.html"
                    style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-shield-halved brand-icon"></i>
                    <h2>ResQ <span>AI</span></h2>
                </a>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="map.html" class="menu-item active"><i class="fa-solid fa-map-location-dot"></i> Map</a>
                <a href="shelters.html" class="menu-item"><i class="fa-solid fa-person-shelter"></i> Shelters</a>
                <a href="heatwave.html" class="menu-item"><i class="fa-solid fa-temperature-high"></i> Heatwave</a>
                <a href="assistant.html" class="menu-item"><i class="fa-solid fa-robot"></i> AI Assistant</a>
                <a href="report.html" class="menu-item"><i class="fa-solid fa-triangle-exclamation"></i> Report</a>
                <a href="settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
        </aside>
        <main class="content-viewport">
            <div class="dynamic-container" style="padding: 20px; height: 100%;">
                <div class="panel-card" style="height: 100%;">
                    <h3>🗺️ Live Geospatial Operations Map</h3>
                    <div id="full-map" style="width:100%; height:calc(100% - 40px); border-radius:10px;"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const fullMap = L.map('full-map').setView([22.8156, 89.5634], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(fullMap);
    </script>
</body>

</html>
