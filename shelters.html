<!DOCTYPE html>
<html lang="en">

<head>

    <title>ResQ AI - Shelters</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="shelters">
    <div class="app-container">
        <aside class="main-sidebar">
            <div class="sidebar-brand">
                <a href="index.html"
                    style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-shield-halved brand-icon"></i>
                    <h2>ResQ <span>AI</span></h2>
                </a>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="map.html" class="menu-item"><i class="fa-solid fa-map-location-dot"></i> Map</a>

                <a href="settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>

            <div class="dynamic-container">
                <div class="panel-card">
                    <h3>Shelters Directory</h3>
                    <p id="shelter-summary" class="muted-line">Nearby shelters will appear after location detection.</p>

    <script src="script.js"></script>

</html>
