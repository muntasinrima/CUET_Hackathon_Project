<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ResQ AI - Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="settings">
    <div class="app-container">
        <aside class="main-sidebar">
            <div class="sidebar-brand">
                <a href="index.html"
                    style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                    <i class="fa-solid fa-shield-halved brand-icon"></i>
                    <h2>ResQ <span>AI</span></h2>
                </a>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="map.html" class="menu-item"><i class="fa-solid fa-map-location-dot"></i> Map</a>
                <a href="shelters.html" class="menu-item"><i class="fa-solid fa-person-shelter"></i> Shelters</a>
                <a href="heatwave.html" class="menu-item"><i class="fa-solid fa-temperature-high"></i> Heatwave</a>
                <a href="assistant.html" class="menu-item"><i class="fa-solid fa-robot"></i> AI Assistant</a>
                <a href="report.html" class="menu-item"><i class="fa-solid fa-triangle-exclamation"></i> Report</a>
                <a href="settings.html" class="menu-item active"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
        </aside>
        <main class="content-viewport">
            <div class="dynamic-container">
                <div class="panel-card">
                    <h3>System Preference Configurations</h3>
                    <p class="muted-line">Adjust threshold triggers, API endpoints and profile parameters.</p>
                    <form id="settings-form" class="settings-form">
                        <label>OpenWeather API token
                            <input name="openWeatherKey" type="text" placeholder="OpenWeather token">
                        </label>
                        <label>Assistant backend endpoint
                            <input name="assistantEndpoint" type="text" placeholder="/api/assistant">
                        </label>
                        <label>Emergency report backend endpoint
                            <input name="reportEndpoint" type="text" placeholder="/api/reports">
                        </label>
                        <label>Heat warning threshold, Celsius
                            <input name="heatWarningCelsius" type="number" min="25" max="60">
                        </label>
                        <label>Shelter capacity warning, percent
                            <input name="shelterCapacityWarning" type="number" min="40" max="100">
                        </label>
                        <label>Profile name
                            <input name="profileName" type="text" placeholder="Your name or team name">
                        </label>
                        <label>Profile phone
                            <input name="profilePhone" type="tel" placeholder="Phone number">
                        </label>
                        <button class="action-btn-primary" type="submit">Save settings</button>
                    </form>
                    <div id="settings-status" class="route-output">Settings are stored locally in this browser.</div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
