<!DOCTYPE html>

<head>

    <title>Live Emergency Status</title>
    <style>
        body {
            font-family: sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .alert-box {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background: #1e293b;
            border-radius: 10px;
        }

        .status-active {
            color: #ef4444;
            font-weight: bold;
        }

        .status-none {
            color: #10b981;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="alert-box">
        <h1>Emergency Status</h1>
        <div id="status-display">Checking live data...</div>
        <br>
        <a href="index.html" style="color: #38bdf8;">Back to Home</a>
    </div>
